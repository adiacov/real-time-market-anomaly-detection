# Configuration for stock data ingestion and processing
# This file defines settings for fetching stock tickers, streaming data, Kafka producers/consumers, and anomaly detection.

# Stocks configuration: Defines which stocks to monitor and how often to fetch data
stocks:
  # List of stock ticker symbols to fetch (e.g., AAPL for Apple, TSLA for Tesla)
  tickers: [ "AAPL", "TSLA", "MSFT", "BTC-USD", "ETH-USD" ]
  # Time interval in seconds between fetching data for each ticker (e.g., 120 means every 2 minutes)
  fetch_interval_seconds: 120

# Stream configuration: Controls data window and anomaly detection thresholds
stream:
  # Maximum number of recent ticker data points to keep in memory for analysis (rolling window)
  rolling_window_size: 30
  # Z-score threshold for detecting anomalies (values above this are flagged as anomalies)
  anomaly_z_threshold: 2.5

# Raw Tickers Kafka Producer: Settings for sending raw ticker data to Kafka
raw_ticker_producer:
  topic: raw-ticks
  bootstrap_servers: "localhost:19092"
  client_id: raw_ticks_producer
  num_partitions: 1
  replication_factor: 1

# Raw Tickers Kafka Consumer: Settings for consuming raw ticker data from Kafka
raw_ticker_consumer:
  topics: [ "raw-ticks" ]
  bootstrap_servers: "localhost:19092"
  group_id: raw-ticks-processor
  client_id: raw_ticks_consumer
  auto_offset_reset: latest
  enable_auto_commit: false

# Anomalies Kafka Producer: Settings for sending detected anomalies to Kafka
anomaly_producer:
  topic: anomalies
  bootstrap_servers: "localhost:19092"
  client_id: anomalies_producer
  num_partitions: 1
  replication_factor: 1

# Anomalies Kafka Consumer: Settings for consuming anomaly data from Kafka
anomaly_consumer:
  topics: [ "anomalies" ]
  bootstrap_servers: "localhost:19092"
  group_id: anomalies-processor
  client_id: anomalies-consumer
  auto_offset_reset: latest
  enable_auto_commit: false

# Anomaly Agent configuration: Settings for the LLM used in anomaly analysis
anomaly_llm:
  # LLM provider (options: ollama, openai, anthropic, google)
  provider: ollama
  # Model name/version to use (e.g., llama3.1:latest for Ollama)
  model: llama3.1:latest
